{% load static %}
<!DOCTYPE html>
<html>
<head>
  <title>Watch - KothamTV</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body class="watch-page">

<div class="watch-hero">
  <div class="watch-overlay"></div>

  <div class="watch-content">

    <div id="player" class="player-wrapper"></div>

    <div class="watch-controls" id="seriesControls" style="display:none;">
      <button class="control-btn" onclick="prevEpisode()">⏪ Prev Ep</button>
      <button class="control-btn" onclick="prevSeason()">⏮️ Prev Season</button>
      <button class="control-btn" onclick="nextSeason()">⏭️ Next Season</button>
      <button class="control-btn" onclick="nextEpisode()">⏩ Next Ep</button>
    </div>

    <div class="watch-controls">
      <button class="control-btn back-home" onclick="window.location.href='/'">
        Watch Another
      </button>
    </div>

  </div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const type = params.get("type");
  const imdb = params.get("imdb");
  const season = params.get("season");
  const episode = params.get("episode");
  const title = params.get("title") || imdb;
  const poster = params.get("poster") || null;

  const seriesControls = document.getElementById("seriesControls");

  if (type === "series") {
    seriesControls.style.display = "flex";
  }

  // ================================
  // SAVE TO RECENTLY WATCHED
  // ================================
  function saveToHistory() {
    if (!type || !imdb) return;

    const history = JSON.parse(localStorage.getItem("kotham_history") || "[]");

    const entry = {
      type,
      imdb,
      title,
      poster,
      season: season || null,
      episode: episode || null,
      watchedAt: Date.now()
    };

    // Remove duplicate if exists
    const filtered = history.filter(h => !(h.imdb === imdb && h.type === type));

    // Add to front
    filtered.unshift(entry);

    // Keep only last 10
    const trimmed = filtered.slice(0, 10);

    localStorage.setItem("kotham_history", JSON.stringify(trimmed));
  }

  // ================================
  // SAVE CONTINUE WATCHING (series)
  // ================================
  function saveContinueWatching() {
    if (type !== "series" || !imdb) return;

    const continueData = JSON.parse(localStorage.getItem("kotham_continue") || "{}");

    continueData[imdb] = {
      imdb,
      title,
      poster,
      season,
      episode,
      savedAt: Date.now()
    };

    localStorage.setItem("kotham_continue", JSON.stringify(continueData));
  }

  // ================================
  // LOAD PLAYER
  // ================================
  let iframeURL = "";

  if (!type || !imdb) {
    document.getElementById("player").innerHTML =
      "<h2 style='color:white;'>Invalid request</h2>";
  } else {
    if (type === "movie") {
      iframeURL = `https://vidsrcme.ru/embed/movie?imdb=${imdb}`;
    } else if (type === "series") {
      iframeURL = `https://vidsrcme.ru/embed/tv?imdb=${imdb}&season=${season}&episode=${episode}`;
    }

    document.getElementById("player").innerHTML = `
      <iframe
        src="${iframeURL}"
        frameborder="0"
        allowfullscreen
        style="width:100%; height:75vh; border-radius:16px;">
      </iframe>
    `;

    // Save history and continue watching
    saveToHistory();
    saveContinueWatching();
  }

  // ================================
  // EPISODE / SEASON NAVIGATION
  // ================================
  function nextEpisode() {
    if (type !== "series") return;
    const nextEp = parseInt(episode) + 1;
    window.location.href = `/watch/?type=series&imdb=${imdb}&season=${season}&episode=${nextEp}&title=${encodeURIComponent(title)}&poster=${encodeURIComponent(poster || "")}`;
  }

  function prevEpisode() {
    if (type !== "series") return;
    const prevEp = parseInt(episode) - 1;
    if (prevEp < 1) return;
    window.location.href = `/watch/?type=series&imdb=${imdb}&season=${season}&episode=${prevEp}&title=${encodeURIComponent(title)}&poster=${encodeURIComponent(poster || "")}`;
  }

  function nextSeason() {
    if (type !== "series") return;
    const nextSe = parseInt(season) + 1;
    window.location.href = `/watch/?type=series&imdb=${imdb}&season=${nextSe}&episode=1&title=${encodeURIComponent(title)}&poster=${encodeURIComponent(poster || "")}`;
  }

  function prevSeason() {
    if (type !== "series") return;
    const prevSe = parseInt(season) - 1;
    if (prevSe < 1) return;
    window.location.href = `/watch/?type=series&imdb=${imdb}&season=${prevSe}&episode=1&title=${encodeURIComponent(title)}&poster=${encodeURIComponent(poster || "")}`;
  }
</script>

</body>
</html>
